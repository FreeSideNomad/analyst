# Live federation test databases (feature 005) — REAL sample DBs in Docker.
#
#   sh scripts/dbs_up.sh   start + seed (Pagila / Northwind / DB2 SAMPLE)
#   docker compose -f docker-compose.dbs.yml down -v   # stop + remove volumes
#
# Ports/credentials + Apple-silicon caveats: features/005-db-federation/runbook.md
# Seeding SQL is downloaded (cached in tests/.dbs_seed/) by scripts/dbs_up.sh.

name: analyst-dbs

services:
  postgres:
    image: postgres:16-alpine
    container_name: analyst-dbs-postgres
    environment:
      POSTGRES_USER: postgres   # pagila DDL references the postgres role
      POSTGRES_PASSWORD: analyst
      POSTGRES_DB: pagila
    ports:
      - "55432:5432"
    volumes:
      # Pagila schema+data run automatically on first boot (empty volume).
      - ./tests/.dbs_seed/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pagila"]
      interval: 2s
      timeout: 3s
      retries: 30

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: analyst-dbs-mssql
    platform: linux/amd64   # no arm64 image — Rosetta/qemu on Apple silicon
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Analyst!Passw0rd"
    ports:
      - "51433:1433"
    volumes:
      # Northwind (instnwnd.sql) is applied by scripts/dbs_up.sh via sqlcmd.
      - ./tests/.dbs_seed/mssql:/seed:ro

  db2:
    image: icr.io/db2_community/db2
    container_name: analyst-dbs-db2
    platform: linux/amd64   # amd64-only image; may be unusable under emulation
    privileged: true        # required by the DB2 community image
    environment:
      LICENSE: accept
      DB2INSTANCE: db2inst1
      DB2INST1_PASSWORD: analyst
      DBNAME: ""            # SAMPLE is created post-boot via db2sampl
    ports:
      - "50000:50000"
