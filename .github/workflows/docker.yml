name: docker

# Publish the single self-contained image to GitHub Container Registry:
#   ghcr.io/freesidenomad/analyst:latest   (main)
#   ghcr.io/freesidenomad/analyst:<sha>    (every published build)
#   ghcr.io/freesidenomad/analyst:<tag>    (releases, e.g. v0.1.0)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Docs-only merges produce a byte-identical image — skip the slow
      # multi-arch build for them. Gated inside the job (not a trigger
      # paths filter) so tag pushes and manual dispatches ALWAYS publish.
      - uses: dorny/paths-filter@v3
        id: image
        if: github.ref_type == 'branch' && github.event_name == 'push'
        with:
          filters: |
            content:
              - 'src/**'
              - 'frontend/**'
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'README.md'
              - '.github/workflows/docker.yml'

      - name: Decide whether the image content changed
        id: decide
        run: |
          if [ "${{ github.ref_type }}" != "branch" ] || \
             [ "${{ github.event_name }}" != "push" ] || \
             [ "${{ steps.image.outputs.content }}" = "true" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only push — image content unchanged, skipping publish."
          fi

      - uses: docker/setup-qemu-action@v3
        if: steps.decide.outputs.publish == 'true'

      - uses: docker/setup-buildx-action@v3
        if: steps.decide.outputs.publish == 'true'

      - uses: docker/login-action@v3
        if: steps.decide.outputs.publish == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        if: steps.decide.outputs.publish == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        if: steps.decide.outputs.publish == 'true'
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
