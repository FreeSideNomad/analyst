name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint · format · types · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (uv provisions Python 3.14)
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check src tests acceptance

      - name: Format check (ruff)
        run: uv run ruff format --check src tests acceptance

      - name: Static type check (mypy)
        run: uv run mypy src/analyst

      - name: Unit tests (pytest)
        run: uv run pytest tests/unit -q

  frontend:
    name: Frontend — lint · typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        run: bun run lint

      - name: Type-check & build
        run: bun run build

  acceptance:
    name: Acceptance — GWT boards (in-process + Playwright e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          uv sync
          cd frontend && bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Run acceptance boards (feature 001 in-process, feature 002 e2e)
        run: ./run-acceptance-tests.sh
