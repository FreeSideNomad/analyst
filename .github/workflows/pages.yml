name: pages

# Build the user manual (docs/site, Jekyll) and publish to GitHub Pages.

on:
  push:
    branches: [main]
    paths: ["docs/site/**", "tutorial/pages/**", "tutorial/files/**", "tutorial/docker-compose.yml", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      # The tutorial's single source of truth is tutorial/pages/ (next to
      # its Makefile and stack); copy it into the site at build time.
      - name: Include the tutorial (pages + downloadable files + compose)
        run: |
          cp -r tutorial/pages docs/site/tutorial
          cp -r tutorial/files docs/site/tutorial/files
          cp tutorial/docker-compose.yml docs/site/tutorial/
          (cd tutorial/files && zip -q /tmp/analyst-tutorial-files.zip *)
          cp /tmp/analyst-tutorial-files.zip docs/site/tutorial/files/analyst-tutorial-files.zip
      - uses: actions/jekyll-build-pages@v1
        with:
          source: docs/site
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
