# Local pre-commit hooks — same gate as CI's backend job.
# Hooks run through `uv run` so tool versions match uv.lock (single source of truth).
# Enable once per clone:  uv run pre-commit install
default_stages: [pre-commit]
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (lint, autofix)
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: mypy
        name: mypy (static types)
        entry: uv run mypy src/analyst
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: pytest-unit
        name: pytest (unit)
        entry: uv run pytest tests/unit -q
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
