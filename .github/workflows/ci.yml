name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint · format · types · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (uv provisions Python 3.14)
        run: uv sync

      - name: Cache the on-demand ML datasets (feature 012 real-data tests)
        uses: actions/cache@v4
        with:
          path: tests/.ml_cache
          key: ml-cache-v1

      - name: Lint (ruff)
        run: uv run ruff check src tests acceptance

      - name: Format check (ruff)
        run: uv run ruff format --check src tests acceptance

      - name: Static type check (mypy)
        run: uv run mypy src/analyst

      - name: Unit tests (pytest)
        run: uv run pytest tests/unit -q

  frontend:
    name: Frontend — lint · typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        run: bun run lint

      - name: Type-check & build
        run: bun run build

  acceptance:
    name: Acceptance — GWT boards (in-process + Playwright e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          uv sync
          cd frontend && bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Cache the on-demand ML datasets (feature 012 real-data board)
        uses: actions/cache@v4
        with:
          path: tests/.ml_cache
          key: ml-cache-v1

      - name: Set up Docker Buildx (container e2e, feature 012)
        uses: docker/setup-buildx-action@v3

      - name: Pre-build the app image with layer cache (container e2e)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: analyst:e2e
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run acceptance boards (all features, incl. the deployed-container journey)
        run: ./run-acceptance-tests.sh
